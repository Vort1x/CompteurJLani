<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur de Jours Interactif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #10b981;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #16213e 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 500px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            animation: slideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        h1 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 600;
            opacity: 0.8;
        }

        .counter-container {
            position: relative;
            margin-bottom: 2.5rem;
            padding: 1.5rem 0;
        }

        #day-count {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            display: block;
            letter-spacing: -0.02em;
            animation: fadeInScale 0.8s ease-out 0.2s both;
        }

        .label {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 0.5rem;
            display: block;
            animation: fadeInScale 0.8s ease-out 0.3s both;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        .info-item {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s ease;
            animation: fadeInScale 0.8s ease-out both;
        }

        .info-item:nth-child(1) { animation-delay: 0.4s; }
        .info-item:nth-child(2) { animation-delay: 0.45s; }
        .info-item:nth-child(3) { animation-delay: 0.5s; }
        .info-item:nth-child(4) { animation-delay: 0.55s; }

        .info-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .info-value {
            display: block;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 0.25rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-tertiary);
            animation: fadeInScale 0.8s ease-out 0.6s both;
        }

        .date-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            margin: 0 4px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .date-badge.end {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 2rem;
            animation: fadeInScale 0.8s ease-out 0.7s both;
        }

        button {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--text-primary);
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: var(--primary);
            border-color: var(--primary-dark);
        }

        button.primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1b4b 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s ease;
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .pulse {
            animation: softPulse 3s infinite ease-in-out;
        }

        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
            }

            #day-count {
                font-size: clamp(3rem, 10vw, 5rem);
            }

            .info-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 0.8rem;
                margin-bottom: 1.5rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>⏱ Temps Écoulé</h1>
            
            <div class="counter-container">
                <span id="day-count" class="pulse">0</span>
                <span class="label">jours</span>
            </div>

            <div class="info-section">
                <div class="info-item">
                    <span class="info-value" id="weeks">0</span>
                    <span class="info-label">Semaines</span>
                </div>
                <div class="info-item">
                    <span class="info-value" id="months">0</span>
                    <span class="info-label">Mois</span>
                </div>
                <div class="info-item">
                    <span class="info-value" id="hours">0</span>
                    <span class="info-label">Heures</span>
                </div>
                <div class="info-item">
                    <span class="info-value" id="percentage">0</span>
                    <span class="info-label">% de l'année</span>
                </div>
            </div>

            <div class="footer">
                Depuis le <span class="date-badge start" id="start-date">13 mars 2026</span> 
                jusqu'à <span class="date-badge end" id="current-date-text">aujourd'hui</span>
            </div>

            <div class="controls">
                <button onclick="openModal()">⚙️ Personnaliser</button>
                <button class="primary" onclick="resetDate()">🔄 Réinitialiser</button>
            </div>
        </div>
    </div>

    <div class="modal" id="dateModal">
        <div class="modal-content">
            <h2>Modifier la Date de Départ</h2>
            <div class="form-group">
                <label for="dateInput">Nouvelle date :</label>
                <input type="date" id="dateInput" />
            </div>
            <div class="modal-buttons">
                <button onclick="closeModal()">Annuler</button>
                <button class="primary" onclick="updateStartDate()">Appliquer</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'dayCounterStartDate';
        let startDate = new Date('2026-03-13T00:00:00');

        function loadStartDate() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                startDate = new Date(stored);
            }
        }

        function saveStartDate() {
            localStorage.setItem(STORAGE_KEY, startDate.toISOString());
        }

        function updateCounter() {
            const now = new Date();
            const diffInMs = now - startDate;
            const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
            
            if (diffInDays < 0) {
                animateNumber('day-count', 0, Math.abs(diffInDays), 1500);
                document.querySelector('.label').innerText = 'jours avant';
                document.getElementById('weeks').innerText = '—';
                document.getElementById('months').innerText = '—';
                document.getElementById('hours').innerText = '—';
                document.getElementById('percentage').innerText = '—';
            } else {
                animateNumber('day-count', 0, diffInDays, 1500);
                
                const weeks = Math.floor(diffInDays / 7);
                const months = Math.floor(diffInDays / 30.44);
                const hours = Math.floor((diffInMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const yearPercentage = ((diffInDays / 365) * 100).toFixed(1);
                
                animateNumber('weeks', 0, weeks, 1500);
                animateNumber('months', 0, months, 1500);
                animateNumber('hours', 0, hours, 1500);
                animateNumberDecimal('percentage', 0, yearPercentage, 1500);
                
                document.querySelector('.label').innerText = 'jours';
            }

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('current-date-text').innerText = now.toLocaleDateString('fr-FR', options);
            document.getElementById('start-date').innerText = startDate.toLocaleDateString('fr-FR', options);
        }

        function animateNumber(elementId, start, end, duration) {
            const obj = document.getElementById(elementId);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerText = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function animateNumberDecimal(elementId, start, end, duration) {
            const obj = document.getElementById(elementId);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = progress * (end - start) + start;
                obj.innerText = value.toFixed(1);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function openModal() {
            document.getElementById('dateModal').classList.add('active');
            const dateInput = document.getElementById('dateInput');
            const year = startDate.getFullYear();
            const month = String(startDate.getMonth() + 1).padStart(2, '0');
            const day = String(startDate.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }

        function closeModal() {
            document.getElementById('dateModal').classList.remove('active');
        }

        function updateStartDate() {
            const dateInput = document.getElementById('dateInput');
            const newDate = new Date(dateInput.value);
            if (!isNaN(newDate)) {
                startDate = newDate;
                saveStartDate();
                updateCounter();
                closeModal();
            } else {
                alert('Date invalide');
            }
        }

        function resetDate() {
            startDate = new Date('2026-03-13T00:00:00');
            localStorage.removeItem(STORAGE_KEY);
            updateCounter();
        }

        document.getElementById('dateModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        window.addEventListener('load', function() {
            loadStartDate();
            updateCounter();
            setInterval(updateCounter, 1000);
        });

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                updateCounter();
            }
        });
    </script>
</body>
</html>
