<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur de Jours | Design Minimaliste</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container Principal */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* Affichage du Chiffre */
        .counter-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        #day-count {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            display: block;
        }

        .label {
            font-size: 1.2rem;
            color: #e2e8f0;
            font-weight: 300;
        }

        /* Détails de la période */
        .info-footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: #64748b;
        }

        .date-badge {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation subtile de pulsation sur le nombre */
        .pulse {
            animation: softPulse 3s infinite ease-in-out;
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Temps écoulé depuis</h1>
        
        <div class="counter-container">
            <span id="day-count" class="pulse">0</span>
            <span class="label">jours</span>
        </div>

        <div class="info-footer">
            Depuis le <span class="date-badge">13 mars 2026</span> <br>
            jusqu'à <span id="current-date-text">aujourd'hui</span>
        </div>
    </div>

    <script>
        function updateCounter() {
            // Date de départ : 13 Mars 2026
            const startDate = new Date('2026-03-13T00:00:00');
            const now = new Date();
            
            // Calcul de la différence en millisecondes
            const diffInMs = now - startDate;
            
            // Conversion en jours (1 jour = 1000ms * 60s * 60min * 24h)
            // On utilise Math.floor pour n'avoir que les jours complets
            const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
            
            const displayElement = document.getElementById('day-count');
            
            // Si la date est dans le futur (diff négative)
            if (diffInDays < 0) {
                displayElement.innerText = "0";
                document.querySelector('.label').innerText = "À venir";
            } else {
                // Animation simple du compteur de 0 vers le chiffre final
                animateNumber(0, diffInDays, 1500);
            }

            // Affichage de la date du jour formatée
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('current-date-text').innerText = now.toLocaleDateString('fr-FR', options);
        }

        // Fonction pour animer le chiffre
        function animateNumber(start, end, duration) {
            const obj = document.getElementById('day-count');
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerText = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Initialisation
        window.onload = updateCounter;
    </script>
</body>
</html>
