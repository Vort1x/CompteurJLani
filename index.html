<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compteur de Jours</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #6366f1;
    --bg: radial-gradient(circle at top, #1e1b4b, #020617);
    --glass: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
}

/* RESET */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family:'Inter', sans-serif;
    background: var(--bg);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARD */
.card {
    position:relative;
    padding:3rem;
    border-radius:30px;
    background: var(--glass);
    backdrop-filter: blur(25px);
    border:1px solid var(--border);
    text-align:center;
    width:90%;
    max-width:420px;
    box-shadow: 
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(255,255,255,0.03);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px) scale(1.01);
}

/* TITLE */
h1 {
    font-size:0.75rem;
    letter-spacing:4px;
    text-transform:uppercase;
    color:#94a3b8;
    margin-bottom:2rem;
}

/* COUNTER */
#day-count {
    font-size:clamp(4rem, 10vw, 7rem);
    font-weight:800;
    background: linear-gradient(180deg, #fff, var(--primary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    display:block;
    text-shadow: 0 0 20px rgba(99,102,241,0.4);
    transition: transform 0.2s ease;
}

.label {
    font-size:1.2rem;
    color:#e2e8f0;
    opacity:0.8;
}

/* FOOTER */
.info-footer {
    margin-top:2rem;
    padding-top:1.5rem;
    border-top:1px solid var(--border);
    font-size:0.8rem;
    color:#64748b;
}

.date-badge {
    background: rgba(99,102,241,0.15);
    padding:4px 12px;
    border-radius:10px;
    color:#a5b4fc;
}

/* PULSE */
.pulse {
    animation:pulse 2.5s infinite;
}

@keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.05); }
}

/* GLOW EFFECT */
.card::before {
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    background: radial-gradient(circle at 50% 0%, rgba(99,102,241,0.3), transparent 70%);
    opacity:0.5;
    z-index:-1;
}
</style>
</head>

<body>

<div class="card">
    <h1>Temps écoulé depuis</h1>

    <span id="day-count" class="pulse">0</span>
    <span class="label">jours</span>

    <div class="info-footer">
        Depuis le <span class="date-badge">13 mars 2026</span><br>
        jusqu'au <span id="current-date"></span>
    </div>
</div>

<script>
const startDate = new Date('2026-03-13T00:00:00');

function calculateDays() {
    const now = new Date();
    const diff = now - startDate;
    return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function animateValue(end) {
    const el = document.getElementById('day-count');
    const duration = 1200;
    let start = 0;
    let startTime = null;

    function animate(time) {
        if (!startTime) startTime = time;
        const progress = Math.min((time - startTime) / duration, 1);

        // easing (plus smooth que linear)
        const ease = 1 - Math.pow(1 - progress, 3);

        el.textContent = Math.floor(ease * end);

        if (progress < 1) {
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(animate);
}

function init() {
    const days = calculateDays();
    const label = document.querySelector('.label');

    if (days < 0) {
        document.getElementById('day-count').textContent = "0";
        label.textContent = "À venir";
    } else {
        animateValue(days);
    }

    const now = new Date();
    document.getElementById('current-date').textContent =
        now.toLocaleDateString('fr-FR', {
            day:'numeric',
            month:'long',
            year:'numeric'
        });
}

init();
</script>

</body>
</html>
